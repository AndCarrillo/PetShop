<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Productos | Huellita PetShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/img/favicon-petshop.png">
</head>

<body class="pagina-interna">
    <!-- Página: productos.html -->
  <div data-component="site-header"></div>
  <main class="container section-space">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3 encabezado-pagina">
      <div>
        <h1 class="fw-bold mb-1" id="pageTitle">Catálogo de productos</h1>
        <p class="text-muted mb-0">Elegí una categoría y refiná el catálogo.</p>
      </div>
      <a class="btn btn-outline-primary" href="carrito.html">Ver carrito</a>
    </div>
    <div class="products-catalog-layout">
      <aside aria-label="Filtros del catálogo" class="products-filter-sidebar">
        <section aria-labelledby="filterTitle" class="filter-panel rounded-4 p-3 p-md-4 mb-4">
          <div class="filter-panel-head d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
            <h2 class="visually-hidden" id="filterTitle">Opciones de filtrado</h2>
            <span class="badge badge-soft" id="resultCount">0 productos</span>
            <button aria-controls="productFiltersCollapse" aria-expanded="false"
              class="btn btn-sm btn-outline-primary filter-toggle-btn d-lg-none"
              data-bs-target="#productFiltersCollapse" data-bs-toggle="collapse" type="button">
              <i aria-hidden="true" class="bi bi-sliders"></i>
              Filtros
            </button>
          </div>
          <div class="collapse filter-collapse" id="productFiltersCollapse">
            <form action="productos.html" class="product-filter-form product-filter-compact" id="productFilters"
              method="get">
              <input id="currentCategoria" name="categoria" type="hidden" value="" />
              <div class="filter-stack">
                <div class="filter-field">
                  <label class="form-label small fw-semibold mb-1" for="q">Buscar</label>
                  <input class="form-control" id="q" name="q" placeholder="Nombre o palabra clave" type="search" />
                </div>
                <div class="filter-field" id="tipoFilterCol">
                  <label class="form-label small fw-semibold mb-1" for="tipo">Mascota</label>
                  <select class="form-select" id="tipo" name="categoria">
                    <option value="">Todas</option>
                    <option value="perros">Perros</option>
                    <option value="gatos">Gatos</option>
                    <option value="aves">Aves</option>
                    <option value="peces">Peces</option>
                    <option value="roedores">Especies pequeñas</option>
                  </select>
                </div>
                <div class="filter-field">
                  <label class="form-label small fw-semibold mb-1" for="categoria">Tipo</label>
                  <select class="form-select" id="categoria" name="categoriaProducto">
                    <option value="">Todos</option>
                    <option value="alimento">Alimentos</option>
                    <option value="accesorios">Accesorios</option>
                    <option value="juguetes">Juguetes</option>
                    <option value="higiene">Higiene</option>
                    <option value="salud">Salud</option>
                    <option value="arena">Arena</option>
                  </select>
                </div>
                <div class="filter-field">
                  <label class="form-label small fw-semibold mb-1" for="precioMax">Precio</label>
                  <select class="form-select" id="precioMax" name="precioMax">
                    <option value="">Sin límite</option>
                    <option value="5000">Hasta ₡5.000</option>
                    <option value="10000">Hasta ₡10.000</option>
                    <option value="20000">Hasta ₡20.000</option>
                    <option value="40000">Hasta ₡40.000</option>
                  </select>
                </div>
                <div class="filter-field">
                  <label class="form-label small fw-semibold mb-1" for="orden">Orden</label>
                  <select class="form-select" id="orden" name="orden">
                    <option value="">Recomendado</option>
                    <option value="precio-asc">Menor precio</option>
                    <option value="precio-desc">Mayor precio</option>
                    <option value="nombre-asc">Nombre A-Z</option>
                  </select>
                </div>
                <div class="filter-actions-minimal">
                  <button aria-label="Aplicar filtros" class="btn btn-primary w-100" type="submit">Aplicar</button>
                  <a class="btn btn-link btn-clear-filter" href="productos.html" id="clearProductFilters">Limpiar</a>
                </div>
              </div>
            </form>
          </div>
        </section>
      </aside>
      <section aria-label="Resultados del catálogo" class="products-results-area">
        <div class="row g-4" id="productsGrid"></div>
        <div class="mt-4" id="paginationContainer"></div>
      </section>
    </div>
  </main>
  <div data-component="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/utilidades.js"></script>
  <script src="assets/js/productos.js"></script>
  <script src="assets/js/alertas.js"></script>
  <script src="assets/js/carrito.js"></script>
  <script src="assets/js/checkout.js"></script>
  <script src="assets/js/interfaz.js"></script>
  <script src="assets/js/selectores-filtros.js"></script>
  <script src="assets/js/app.js"></script>
</body>

</html>
