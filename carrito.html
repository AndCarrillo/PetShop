<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carrito | Huellita PetShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/img/favicon-petshop.png">
</head>

<body class="pagina-interna">
    <!-- Página: carrito.html -->
  <div data-component="site-header"></div>
  <main class="container section-space">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3 encabezado-pagina">
      <div>
        <h1 class="fw-bold mb-1">Mi carrito de compras</h1>
        <p class="text-muted mb-0">Puede aumentar unidades, disminuirlas o eliminar productos del carrito.</p>
      </div>
      <a class="btn btn-primary" href="productos.html">Volver al catálogo</a>
    </div>
    <div class="row g-4">
      <div class="col-lg-8">
        <div id="cartItems"></div>
      </div>
      <div class="col-lg-4" id="cartSummaryWrapper">
        <div class="summary-card sticky-lg-top">
          <div class="summary-header p-3">
            <h4 class="mb-0">Resumen del pedido</h4>
          </div>
          <div class="p-3">
            <div id="cartSummary"></div>
            <div class="cart-delivery-note" role="note">
              <i class="bi bi-truck" aria-hidden="true"></i>
              <span>Envíos solo dentro de la GAM.</span>
            </div>
            <a class="btn btn-checkout-continue w-100 btn-lg mt-3" href="checkout.html">Continuar con la compra</a>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div data-component="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/utilidades.js"></script>
  <script src="assets/js/productos.js"></script>
  <script src="assets/js/alertas.js"></script>
  <script src="assets/js/carrito.js"></script>
  <script src="assets/js/checkout.js"></script>
  <script src="assets/js/interfaz.js"></script>
  <script src="assets/js/selectores-filtros.js"></script>
  <script src="assets/js/app.js"></script>
</body>

</html>
