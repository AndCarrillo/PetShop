<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detalle | Huellita PetShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/img/favicon-petshop.png">
</head>

<body class="pagina-interna">
    <!-- Página: detalle.html -->
  <div data-component="site-header"></div>
  <main class="container section-space detail-page">
    <div id="detailContent"></div>
    <hr class="my-4" />
    <div class="related-header d-flex align-items-end justify-content-between gap-3 mb-3 encabezado-pagina encabezado-pagina-relacionados">
      <div>
        <h2 class="fw-bold mb-1">Productos relacionados</h2>
        <p class="text-muted mb-0 small">Opciones similares para continuar explorando.</p>
      </div>
      <div aria-label="Controles de productos relacionados" class="related-desktop-controls d-none"
        id="relatedDesktopControls">
        <button aria-label="Ver productos anteriores" class="btn related-arrow" data-related-dir="prev" type="button">
          <i aria-hidden="true" class="bi bi-arrow-left"></i>
        </button>
        <button aria-label="Ver más productos relacionados" class="btn related-arrow" data-related-dir="next"
          type="button">
          <i aria-hidden="true" class="bi bi-arrow-right"></i>
        </button>
      </div>
    </div>
    <div aria-label="Productos relacionados desplazables horizontalmente" class="row g-3 related-scroll"
      id="relatedGrid" role="region" tabindex="0"></div>
    <div aria-label="Indicadores de productos relacionados" class="carousel-dots related-dots d-lg-none"
      id="relatedDots"></div>
  </main>
  <div data-component="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/utilidades.js"></script>
  <script src="assets/js/productos.js"></script>
  <script src="assets/js/alertas.js"></script>
  <script src="assets/js/carrito.js"></script>
  <script src="assets/js/checkout.js"></script>
  <script src="assets/js/interfaz.js"></script>
  <script src="assets/js/selectores-filtros.js"></script>
  <script src="assets/js/app.js"></script>
</body>

</html>
