<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buscar productos | Huellita PetShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/img/favicon-petshop.png">
</head>

<body class="pagina-interna">
    <!-- Página: busqueda.html -->
  <div data-component="site-header"></div>
  <main class="container section-space">
    <div class="mb-3 encabezado-pagina">
      <h1 class="fw-bold mb-1">Buscar productos</h1>
      <p class="text-muted mb-0">Buscá por nombre, mascota o tipo.</p>
    </div>
    <section aria-labelledby="searchPanelTitle" class="search-panel rounded-4 p-3 p-md-4 mb-4">
      <h2 class="visually-hidden" id="searchPanelTitle">Búsqueda y filtros</h2>
      <form action="busqueda.html" id="searchFilters" method="get">
        <div class="search-panel-head">
          <span class="badge badge-soft" id="resultCount">0 productos</span>
          <button aria-controls="searchFiltersCollapse" aria-expanded="false"
            class="btn btn-outline-primary filter-toggle-btn d-lg-none" data-bs-target="#searchFiltersCollapse"
            data-bs-toggle="collapse" type="button">
            <i aria-hidden="true" class="bi bi-sliders"></i>
            Filtros
          </button>
        </div>
        <div class="collapse filter-collapse mt-3 d-lg-block" id="searchFiltersCollapse">
          <div class="search-filter-stack row g-3 align-items-end">
            <div class="col-12 col-lg-4">
              <label class="form-label small mb-1" for="q">Buscar</label>
              <input class="form-control" id="q" name="q" placeholder="Nombre o palabra clave" type="search" />
            </div>
            <div class="col-12 col-sm-6 col-lg-2">
              <label class="form-label small mb-1" for="tipo">Mascota</label>
              <select class="form-select form-select-sm" id="tipo" name="tipo">
                <option value="">Todas</option>
                <option value="perros">Perros</option>
                <option value="gatos">Gatos</option>
                <option value="aves">Aves</option>
                <option value="peces">Peces</option>
                <option value="roedores">Especies pequeñas</option>
              </select>
            </div>
            <div class="col-12 col-sm-6 col-lg-2">
              <label class="form-label small mb-1" for="categoria">Tipo</label>
              <select class="form-select form-select-sm" id="categoria" name="categoriaProducto">
                <option value="">Todas</option>
                <option value="alimento">Alimento</option>
                <option value="accesorios">Accesorios</option>
                <option value="juguetes">Juguetes</option>
                <option value="higiene">Higiene</option>
                <option value="salud">Salud</option>
              </select>
            </div>
            <div class="col-12 col-sm-6 col-lg-2">
              <label class="form-label small mb-1" for="precioMax">Precio</label>
              <select class="form-select form-select-sm" id="precioMax" name="precioMax">
                <option value="">Sin límite</option>
                <option value="5000">Hasta ₡5.000</option>
                <option value="10000">Hasta ₡10.000</option>
                <option value="20000">Hasta ₡20.000</option>
                <option value="40000">Hasta ₡40.000</option>
              </select>
            </div>
            <div class="col-12 col-sm-6 col-lg-2">
              <label class="form-label small mb-1" for="orden">Orden</label>
              <select class="form-select form-select-sm" id="orden" name="orden">
                <option value="recomendado">Recomendado</option>
                <option value="precio-asc">Precio menor</option>
                <option value="precio-desc">Precio mayor</option>
                <option value="nombre-asc">Nombre A-Z</option>
              </select>
            </div>
          </div>
          <div class="search-filter-actions">
            <button class="btn btn-primary search-apply-btn" type="submit">Aplicar</button>
            <a class="btn search-clear-btn" href="busqueda.html">Limpiar</a>
          </div>
        </div>
      </form>
    </section>
    <h2 class="visually-hidden" id="pageTitle">Resultados simulados</h2>
    <div class="row g-4" id="productsGrid"></div>
    <div class="mt-4" id="paginationContainer"></div>
  </main>
  <div data-component="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/utilidades.js"></script>
  <script src="assets/js/productos.js"></script>
  <script src="assets/js/alertas.js"></script>
  <script src="assets/js/carrito.js"></script>
  <script src="assets/js/checkout.js"></script>
  <script src="assets/js/interfaz.js"></script>
  <script src="assets/js/selectores-filtros.js"></script>
  <script src="assets/js/app.js"></script>
</body>

</html>
